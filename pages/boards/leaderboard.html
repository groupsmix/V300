<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — GroupsMix</title>
    <meta name="description"
        content="See the top contributors on GroupsMix. Earn GXP by submitting groups, leaving reviews, and more.">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <div class="container" style="max-width:var(--container-md);padding:var(--space-8) var(--space-4)">
            <h1 style="text-align:center;margin-bottom:var(--space-2)">🏆 Leaderboard</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8)">Top contributors
                ranked by GXP</p>
            <div class="card">
                <div class="card__body" style="padding:0">
                    <div id="leaderboard-list">
                        <div class="skeleton" style="height:400px"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadLeaderboard);
        async function loadLeaderboard() {
            const el = document.getElementById('leaderboard-list');
            try {
                const data = await DB.user.getLeaderboard({ limit: 50 });
                if (!data?.length) { el.innerHTML = '<div style="padding:var(--space-8);text-align:center;color:var(--text-tertiary)">No users yet</div>'; return; }
                const currentUserId = Auth.getUserId();
                el.innerHTML = data.map((u, i) => {
                    const level = Algorithms.getLevelInfo(u.gxp);
                    const isCurrent = u.id === currentUserId;
                    const medals = ['🥇', '🥈', '🥉'];
                    return '<div class="leaderboard-item' + (isCurrent ? ' leaderboard-item--current' : '') + '">' +
                        '<span class="leaderboard-item__rank">' + (medals[i] || (i + 1)) + '</span>' +
                        '<span class="leaderboard-item__name">' + Security.sanitize(u.display_name || 'Anonymous') + '</span>' +
                        '<span class="leaderboard-item__level">' + level.emoji + ' ' + level.name + '</span>' +
                        '<span class="leaderboard-item__gxp">' + UI.formatNumber(u.gxp || 0) + ' GXP</span>' +
                        '</div>';
                }).join('');
            } catch { el.innerHTML = '<div style="padding:var(--space-4);text-align:center;color:var(--text-tertiary)">Unable to load</div>'; }
        }
    </script>
</body>

</html>
