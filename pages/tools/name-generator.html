<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Name Generator — GroupsMix</title>
    <meta name="description" content="Free group name generator. Get creative name ideas for your social media group.">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <div class="container" style="max-width:var(--container-sm);padding:var(--space-8) var(--space-4)">
            <h1 style="text-align:center;margin-bottom:var(--space-2)">💡 Group Name Generator</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8)">Get creative name
                ideas for your group</p>
            <div class="card">
                <div class="card__body" style="padding:var(--space-6)">
                    <div class="form-group"><label class="form-label">Category</label>
                        <select class="form-select" id="name-category">
                            <option value="">Any Category</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Style</label>
                        <select class="form-select" id="name-style">
                            <option value="professional">Professional</option>
                            <option value="creative">Creative</option>
                            <option value="fun">Fun & Casual</option>
                            <option value="community">Community</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-full" id="name-generate">✨ Generate Names</button>
                    <div id="name-results" style="margin-top:var(--space-6);display:none"></div>
                </div>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cs = document.getElementById('name-category');
            CONFIG.categories.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.emoji + ' ' + c.name; cs.appendChild(o); });
            document.getElementById('name-generate')?.addEventListener('click', generate);
        });
        function generate() {
            const cat = document.getElementById('name-category')?.value || '';
            const style = document.getElementById('name-style')?.value || 'professional';
            const catName = CONFIG.categories.find(c => c.id === cat)?.name || 'General';
            const prefixes = { professional: ['Elite', 'Prime', 'Pro', 'Premium', 'Expert'], creative: ['Spark', 'Nexus', 'Pulse', 'Orbit', 'Flux'], fun: ['Chill', 'Vibe', 'Squad', 'Gang', 'Fam'], community: ['United', 'Hub', 'Circle', 'Network', 'Alliance'] };
            const suffixes = ['Hub', 'Zone', 'World', 'Central', 'Lounge', 'Club', 'Space', 'Circle', 'Collective', 'Forum'];
            const names = [];
            const pref = prefixes[style] || prefixes.professional;
            for (let i = 0; i < 10; i++) {
                const p = pref[Math.floor(Math.random() * pref.length)];
                const s = suffixes[Math.floor(Math.random() * suffixes.length)];
                names.push(p + ' ' + catName + ' ' + s);
            }
            const el = document.getElementById('name-results');
            el.style.display = '';
            el.innerHTML = '<h3 style="margin-bottom:var(--space-3)">Generated Names</h3>' +
                names.map(n => '<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-2) 0;border-bottom:1px solid var(--border-primary)">' +
                    '<span>' + Security.sanitize(n) + '</span><button class="btn btn-ghost btn-sm" data-copy-text="' + Security.sanitize(n).replace(/"/g, '&quot;') + '">📋</button></div>').join('');
            el.querySelectorAll('[data-copy-text]').forEach(btn => {
                btn.addEventListener('click', () => UI.copyToClipboard(btn.dataset.copyText));
            });
        }
    </script>
</body>

</html>
