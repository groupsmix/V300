<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator — GroupsMix</title>
    <meta name="description" content="Generate QR codes for your group invite links. Free and instant.">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <div class="container" style="max-width:var(--container-sm);padding:var(--space-8) var(--space-4)">
            <h1 style="text-align:center;margin-bottom:var(--space-2)">📱 QR Code Generator</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8)">Paste any URL to
                generate a QR code</p>
            <div class="card">
                <div class="card__body" style="padding:var(--space-6)">
                    <div class="form-group"><label class="form-label" for="qr-input">URL</label>
                        <input type="url" class="form-input" id="qr-input" placeholder="https://chat.whatsapp.com/..."
                            required>
                    </div>
                    <button class="btn btn-primary btn-full" id="qr-generate">Generate QR Code</button>
                    <div id="qr-output" style="text-align:center;margin-top:var(--space-6);display:none">
                        <div id="qr-canvas"></div>
                        <button class="btn btn-secondary btn-sm" id="qr-download" style="margin-top:var(--space-4)">📥
                            Download</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        let currentCanvas = null;
        document.getElementById('qr-generate')?.addEventListener('click', () => {
            const url = document.getElementById('qr-input')?.value?.trim();
            if (!url) { UI.toast('Please enter a URL', 'error'); return; }
            const canvas = document.createElement('canvas');
            document.getElementById('qr-canvas').innerHTML = '';
            QRCode.toCanvas(canvas, url, { width: 256, margin: 2, color: { dark: '#1a1a2e', light: '#ffffff' } }, (err) => {
                if (err) { UI.toast('Failed to generate QR code', 'error'); return; }
                document.getElementById('qr-canvas').appendChild(canvas);
                currentCanvas = canvas;
                document.getElementById('qr-output').style.display = '';
            });
        });
        document.getElementById('qr-download')?.addEventListener('click', () => {
            if (!currentCanvas) return;
            const link = document.createElement('a');
            link.download = 'groupsmix-qr.png';
            link.href = currentCanvas.toDataURL();
            link.click();
        });
    </script>
</body>

</html>
