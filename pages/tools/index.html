<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Tools — GroupsMix</title>
    <meta name="description" content="Free tools for group admins: QR generator, name generator, bio generator.">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <div class="container" style="max-width:var(--container-lg);padding:var(--space-8) var(--space-4)">
            <h1 style="text-align:center;margin-bottom:var(--space-2)">🧰 Free Tools</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8)">Useful tools for group
                admins and owners</p>
            <div class="grid grid-3">
                <a href="/tools/qr-generator" class="card card--clickable">
                    <div class="card__body" style="text-align:center;padding:var(--space-6)">
                        <div style="font-size:var(--text-4xl);margin-bottom:var(--space-3)">📱</div>
                        <h3>QR Code Generator</h3>
                        <p style="color:var(--text-secondary);font-size:var(--text-sm);margin-top:var(--space-2)">
                            Generate QR codes for your group invite links</p>
                    </div>
                </a>
                <a href="/tools/name-generator" class="card card--clickable">
                    <div class="card__body" style="text-align:center;padding:var(--space-6)">
                        <div style="font-size:var(--text-4xl);margin-bottom:var(--space-3)">💡</div>
                        <h3>Group Name Generator</h3>
                        <p style="color:var(--text-secondary);font-size:var(--text-sm);margin-top:var(--space-2)">Get
                            creative name ideas for your group</p>
                    </div>
                </a>
                <a href="/tools/bio-generator" class="card card--clickable">
                    <div class="card__body" style="text-align:center;padding:var(--space-6)">
                        <div style="font-size:var(--text-4xl);margin-bottom:var(--space-3)">📝</div>
                        <h3>Bio Generator</h3>
                        <p style="color:var(--text-secondary);font-size:var(--text-sm);margin-top:var(--space-2)">Create
                            engaging group descriptions</p>
                    </div>
                </a>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
</body>

</html>
