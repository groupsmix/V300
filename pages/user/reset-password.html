<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — GroupsMix</title>
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <main id="main-content" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
        <div class="card" style="max-width:400px;width:100%;margin:var(--space-4)">
            <div class="card__body" style="padding:var(--space-6)">
                <h1 style="text-align:center;margin-bottom:var(--space-6)">🔑 Reset Password</h1>
                <form id="reset-form">
                    <div class="form-group"><label class="form-label" for="new-password">New Password</label><input
                            type="password" class="form-input" id="new-password" placeholder="Min 6 characters"
                            minlength="6" required></div>
                    <div class="form-group"><label class="form-label" for="confirm-password">Confirm
                            Password</label><input type="password" class="form-input" id="confirm-password"
                            placeholder="Confirm" required></div>
                    <button type="submit" class="btn btn-primary btn-full">Update Password</button>
                </form>
                <div style="text-align:center;margin-top:var(--space-4)"><a href="/" style="font-size:var(--text-sm)">←
                        Back to Home</a></div>
            </div>
        </div>
    </main>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script>
        document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            if (pw.length < 6) { UI.toast('Password must be at least 6 characters', 'error'); return; }
            if (pw !== confirm) { UI.toast('Passwords do not match', 'error'); return; }
            const { error } = await supabase.auth.updateUser({ password: pw });
            if (error) { UI.toast(error.message, 'error'); return; }
            UI.toast('Password updated successfully!', 'success');
            setTimeout(() => { window.location.href = '/'; }, 2000);
        });
    </script>
</body>

</html>
