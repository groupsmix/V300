<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article — GroupsMix</title>
    <meta name="description" content="">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
    <style>
        .article {
            max-width: var(--container-md);
            margin: 0 auto;
            padding: var(--space-8) var(--space-4);
        }

        .article__header {
            margin-bottom: var(--space-8);
        }

        .article__title {
            font-size: var(--text-3xl);
            margin-bottom: var(--space-4);
        }

        .article__meta {
            display: flex;
            gap: var(--space-4);
            color: var(--text-secondary);
            font-size: var(--text-sm);
            flex-wrap: wrap;
        }

        .article__cover {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-8);
        }

        .article__body {
            color: var(--text-secondary);
            line-height: var(--leading-relaxed);
        }

        .article__body h2 {
            color: var(--text-primary);
            margin: var(--space-8) 0 var(--space-4);
            font-size: var(--text-xl);
        }

        .article__body p {
            margin-bottom: var(--space-4);
        }
    </style>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <article class="article" id="article-content">
            <div class="skeleton" style="height:400px;border-radius:var(--radius-xl)"></div>
        </article>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const slug = new URLSearchParams(window.location.search).get('slug');
            if (!slug) { window.location.href = '/articles'; return; }
            const el = document.getElementById('article-content');
            try {
                const article = await DB.articles.getBySlug(slug);
                if (!article) { el.innerHTML = '<div class="empty-state"><div class="empty-state__icon">📰</div><div class="empty-state__title">Article Not Found</div><a href="/articles" class="btn btn-primary">Browse Articles</a></div>'; return; }
                document.title = Security.sanitize(article.title) + ' — GroupsMix';
                document.querySelector('meta[name="description"]')?.setAttribute('content', Security.sanitize(article.excerpt || '').slice(0, 160));
                DB.articles.incrementViews(article.id);
                el.innerHTML = '<div class="article__header"><h1 class="article__title">' + Security.sanitize(article.title) + '</h1>' +
                    '<div class="article__meta"><span>✍️ ' + Security.sanitize(article.author_name || '') + '</span><span>📅 ' + UI.formatDate(article.published_at) + '</span><span>👁 ' + UI.formatNumber(article.views || 0) + '</span></div></div>' +
                    (article.cover_image ? '<img class="article__cover" src="' + Security.sanitize(article.cover_image) + '" alt="">' : '') +
                    '<div class="article__body">' + (article.content || '') + '</div>';
            } catch { el.innerHTML = '<div style="text-align:center;color:var(--text-tertiary);padding:var(--space-8)">Unable to load article</div>'; }
        });
    </script>
</body>

</html>
