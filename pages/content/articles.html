<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — GroupsMix</title>
    <meta name="description"
        content="Read articles and guides about building, growing, and managing social media groups.">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <div class="container" style="max-width:var(--container-lg);padding:var(--space-8) var(--space-4)">
            <h1 style="text-align:center;margin-bottom:var(--space-2)">📰 Articles</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8)">Guides, tips, and
                insights for group owners</p>
            <div id="articles-list">
                <div class="grid grid-3">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
            </div>
            <div id="pagination-container"></div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', load);
        let page = 1;
        async function load() {
            const el = document.getElementById('articles-list');
            try {
                const { data, count } = await DB.articles.getPublished({ limit: 9, offset: (page - 1) * 9 });
                if (!data?.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state__icon">📰</div><div class="empty-state__title">No Articles Yet</div><div class="empty-state__text">Check back soon for new content!</div></div>'; return; }
                el.innerHTML = '<div class="grid grid-3">' + data.map(a => UI.articleCard(a)).join('') + '</div>';
                const totalPages = Math.ceil((count || 0) / 9);
                if (totalPages > 1) {
                    document.getElementById('pagination-container').innerHTML = UI.pagination(page, totalPages);
                    UI.initPagination('pagination-container', (p) => { page = p; load(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
                }
            } catch { el.innerHTML = '<div style="text-align:center;color:var(--text-tertiary)">Unable to load articles</div>'; }
        }
    </script>
</body>

</html>
