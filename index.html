<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — GroupsMix</title>
    <meta name="description" content="Contact the GroupsMix team.">
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    </noscript>
    <link rel="stylesheet" href="/assets/css/shared.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="site-header"></header>
    <div id="announcement-bar"></div>
    <main id="main-content">
        <div class="container" style="max-width:var(--container-sm);padding:var(--space-8) var(--space-4)">
            <h1 style="text-align:center;margin-bottom:var(--space-2)">📧 Contact Us</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:var(--space-8)">We'd love to hear from
                you</p>
            <div class="card">
                <div class="card__body" style="padding:var(--space-6)">
                    <form id="contact-form">
                        <div class="form-group"><label class="form-label" for="contact-name">Name</label><input
                                type="text" class="form-input" id="contact-name" required></div>
                        <div class="form-group"><label class="form-label" for="contact-email">Email</label><input
                                type="email" class="form-input" id="contact-email" required></div>
                        <div class="form-group"><label class="form-label" for="contact-subject">Subject</label>
                            <select class="form-select" id="contact-subject">
                                <option value="general">General Inquiry</option>
                                <option value="bug">Bug Report</option>
                                <option value="advertise">Advertising</option>
                                <option value="partnership">Partnership</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group"><label class="form-label" for="contact-message">Message</label><textarea
                                class="form-textarea" id="contact-message" required minlength="10" maxlength="2000"
                                style="min-height:120px"></textarea></div>
                        <div class="form-group" id="turnstile-wrapper" style="display:none"><div id="turnstile-widget"></div></div>
                        <button type="submit" class="btn btn-primary btn-full">📤 Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div id="modal-container"></div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/components.js"></script>
    <script>
        var turnstileToken = null;
        if (CONFIG.turnstileSiteKey && typeof turnstile !== 'undefined') {
            document.getElementById('turnstile-wrapper').style.display = '';
            turnstile.render('#turnstile-widget', {
                sitekey: CONFIG.turnstileSiteKey,
                callback: function(token) { turnstileToken = token; }
            });
        }
        document.getElementById('contact-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (CONFIG.turnstileSiteKey && !turnstileToken) { UI.toast('Please complete the CAPTCHA verification.', 'error'); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Sending...'; }
            const result = await DB.contacts.submit({
                name: document.getElementById('contact-name').value.trim(),
                email: document.getElementById('contact-email').value.trim(),
                subject: document.getElementById('contact-subject').value,
                message: document.getElementById('contact-message').value.trim()
            });
            if (result) {
                e.target.innerHTML = '<div style="text-align:center;padding:var(--space-6)"><div style="font-size:var(--text-3xl);margin-bottom:var(--space-3)">✅</div><h3>Message Sent!</h3><p style="color:var(--text-secondary)">We\'ll get back to you soon.</p></div>';
            } else if (btn) { btn.disabled = false; btn.textContent = '📤 Send Message'; }
        });
    </script>
</body>

</html>
